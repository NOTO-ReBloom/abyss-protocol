<style>
:root{--bg:#040708;--panel:#0b1317;--panel2:#101b20;--line:#355058;--line2:#23353a;--text:#eaf3f1;--muted:#96adab;--cyan:#7fe1d8;--amber:#e2a75b;--red:#ca6667;--rust:#6f4c36;--rust2:#3f2418;}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:radial-gradient(circle at 30% -10%,rgba(100,179,183,.07),transparent 30%),#040708;color:var(--text);font-family:Inter,"Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}body{overflow:hidden}a{color:inherit;text-decoration:none}button{font:inherit;color:inherit}
.shell{display:grid;grid-template-columns:280px minmax(0,1fr);height:100%}
aside{position:relative;background:linear-gradient(180deg,#131d22,#060b0d);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:12px;overflow:hidden;box-shadow:18px 0 42px rgba(0,0,0,.35)}

.alert{position:relative;z-index:1;border:1px solid var(--line2);padding:10px;background:linear-gradient(180deg,#0a1317,#060b0d);font-size:11px;line-height:1.65;color:#c8d7d4}
.alert b{display:block;color:#fff;font-size:12px;letter-spacing:.08em;margin-bottom:4px}.alert em{font-style:normal;color:var(--cyan)}

.thumb{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:10px;padding:6px;border:1px solid var(--line2);background:linear-gradient(180deg,#10191d,#060b0d);cursor:pointer;text-align:left;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.thumb:hover,.thumb.active{border-color:#6ca8a5;background:linear-gradient(180deg,#132025,#081013)}

.thumb img{width:100%;height:60px;object-fit:cover;display:block;border:1px solid #283b40;background:#dcd8ca}
.actions{position:relative;z-index:1;display:grid;gap:8px;margin-top:auto;padding-top:8px}.act{height:38px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:linear-gradient(180deg,#132126,#091014);font-size:11px;letter-spacing:.08em}
.act.primary{border-color:#5a8f8d;background:linear-gradient(180deg,#1a3e41,#0c2325)}
main{min-width:0;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0e171b,#080d10);box-shadow:0 10px 28px rgba(0,0,0,.25)}
.topbar .meta{min-width:0}.topbar .meta small{display:block;color:#79908c;font-size:10px;letter-spacing:.15em}.topbar .meta b{display:block;margin-top:4px;font-size:20px;letter-spacing:.03em}.page-tools{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.page-btn,.page-count{height:38px;padding:0 14px;border:1px solid var(--line);background:linear-gradient(180deg,#152026,#091014);display:inline-flex;align-items:center;justify-content:center}.page-btn{cursor:pointer}.page-btn:hover{border-color:#6ca8a5}.page-count{min-width:112px;color:#dce9e6;font-variant-numeric:tabular-nums}
.viewer{position:relative;min-height:0;overflow:auto;padding:22px;background:radial-gradient(circle at 50% 0,rgba(110,70,43,.12),transparent 24%),linear-gradient(180deg,#040709,#020405)}
.viewer:before{content:"";position:fixed;inset:56px 0 0;pointer-events:none;opacity:.24;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.01) 1px,transparent 1px);background-size:4px 4px}
.paper-wrap{max-width:980px;margin:0 auto;display:grid;gap:16px}
.paper{position:relative;padding:18px;background:linear-gradient(180deg,#1b2327,#0b1114);border:1px solid #495e64;box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.04)}
.paper:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 5% 8%,rgba(132,82,52,.2),transparent 14%),radial-gradient(circle at 92% 16%,rgba(109,65,40,.15),transparent 15%),radial-gradient(circle at 15% 86%,rgba(94,58,37,.12),transparent 18%),linear-gradient(180deg,transparent,rgba(0,0,0,.18));mix-blend-mode:screen}
.paper img{display:block;width:100%;height:auto;background:#fff;box-shadow:0 18px 40px rgba(0,0,0,.45)}
.caption{margin-top:10px;color:#8fa6a2;font-size:12px;letter-spacing:.08em;text-align:center}
@media (max-width:1100px){.shell{grid-template-columns:220px minmax(0,1fr)} .topbar .meta b{font-size:18px}}
@media (max-width:860px){body{overflow:auto}.shell{display:block;height:auto;min-height:100%}aside{height:auto;max-height:none;border-right:0;border-bottom:1px solid var(--line)}main{height:auto;min-height:0}.viewer{padding:14px}.paper{padding:10px}.thumbs{max-height:240px}.page-tools{margin-left:0}}
</style></head><body>

<script>
const pages=["manual_p01.jpg","manual_p02.jpg","manual_p03.jpg","manual_p04.jpg","manual_p05.jpg","manual_p06.jpg","manual_p07.jpg","manual_p08.jpg","manual_p09.jpg","manual_p10.jpg","manual_p11.jpg","manual_p12.jpg","manual_p13.jpg","manual_p14.jpg","manual_p15.jpg","manual_p16.jpg","manual_p17.jpg","manual_p18.jpg"];
let current=0;
const img=document.getElementById('pageImage');
const count=document.getElementById('pageCount');
const caption=document.getElementById('caption');
const thumbs=[...document.querySelectorAll('.thumb')];
function showPage(index){ current=(index+pages.length)%pages.length; img.src=pages[current]; img.alt=`ABYSS PROTOCOL 手順書 ${current+1}ページ目`; count.textContent=`PAGE ${String(current+1).padStart(2,'0')} / 18`; caption.textContent=`PAGE ${String(current+1).padStart(2,'0')} / 18`; thumbs.forEach((t,i)=>t.classList.toggle('active',i===current)); thumbs[current].scrollIntoView({block:'nearest'}); document.getElementById('viewer').scrollTop=0; history.replaceState(null,'',`#page-${current+1}`); }
thumbs.forEach((btn,i)=>btn.addEventListener('click',()=>showPage(i)));
document.getElementById('prevBtn').addEventListener('click',()=>showPage(current-1));
document.getElementById('nextBtn').addEventListener('click',()=>showPage(current+1));
window.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')showPage(current+1); if(e.key==='ArrowLeft')showPage(current-1); });
const match=location.hash.match(/page-(\d+)/); if(match){ const n=Math.max(1,Math.min(pages.length,Number(match[1]))); showPage(n-1); } else { showPage(0); }
</script></body></html>
