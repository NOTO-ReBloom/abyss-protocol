<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05090c"><title>ABYSS PROTOCOL — 解析員手順書</title><style>
:root{--bg:#04080b;--panel:#0b1418;--panel2:#111e23;--line:#36535a;--text:#eaf3f1;--muted:#91aaa6;--cyan:#75ded3;--amber:#e6aa65;}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020507;color:var(--text);font-family:Inter,"Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}button,a{font:inherit;color:inherit}a{text-decoration:none}
.app{height:100%;display:grid;grid-template-columns:230px minmax(0,1fr);background:radial-gradient(circle at 50% -20%,rgba(64,139,150,.12),transparent 36%),#020507}
.side{padding:14px 12px;display:grid;grid-template-rows:auto auto auto 1fr auto;gap:10px;border-right:1px solid var(--line);background:linear-gradient(180deg,#101b20,#05090c);overflow:hidden}
.brand{display:flex;gap:10px;align-items:center;border:1px solid #2e474d;background:#0a1317;padding:10px}.mark{width:44px;height:44px;display:grid;place-items:center;border:1px solid #52747a;font-weight:800}.brand b{font-size:13px}.brand small{display:block;margin-top:4px;color:#738d89;font-size:8px;letter-spacing:.13em}
.note{border:1px solid #5b4733;background:#17110c;padding:10px;font-size:10px;line-height:1.6;color:#ddc29b}.note b{display:block;margin-bottom:4px;color:#f0d09f}
.page-index{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.page-key{height:34px;border:1px solid #314b51;background:#0b1519;border-radius:3px;cursor:pointer;font-size:11px}.page-key:hover,.page-key.active{border-color:var(--cyan);background:#133038;color:#fff}
.controls{display:grid;gap:7px;align-content:end}.controls a{height:36px;display:flex;align-items:center;justify-content:center;border:1px solid #35545a;background:#0b1519;font-size:10px}.controls a.primary{border-color:#5ba8a2;background:#123237}
.main{min-width:0;display:grid;grid-template-rows:54px minmax(0,1fr) 44px;overflow:hidden}
.top{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--line);background:#081115}.top b{font-size:16px}.counter{margin-left:auto;font-size:12px;color:#a8beba;font-variant-numeric:tabular-nums}
.stage{min-height:0;display:grid;grid-template-columns:52px minmax(0,1fr) 52px;align-items:center;gap:10px;padding:12px 14px;overflow:hidden;background:radial-gradient(circle at 50% 0,rgba(116,73,48,.1),transparent 24%),#030608}
.nav{height:58px;border:1px solid #48656b;background:#0d191d;border-radius:50%;cursor:pointer;font-size:28px}.nav:hover{border-color:var(--cyan)}
.book{height:100%;min-height:0;display:grid;place-items:center;perspective:1800px;overflow:hidden}.page-shell{position:relative;max-width:100%;max-height:100%;aspect-ratio:16/9;box-shadow:0 28px 70px rgba(0,0,0,.55);border:1px solid #53676c;background:#dcd8cb;overflow:hidden}.page-shell img{display:block;width:100%;height:100%;object-fit:contain;background:#fff}.page-shell:after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 0 2px rgba(0,0,0,.12),inset 0 0 46px rgba(91,63,43,.12)}
.turn{position:absolute;inset:0;display:none;transform-style:preserve-3d;transform-origin:left center;z-index:5}.turn.run{display:block;animation:flip .58s ease both}.turn.back{transform-origin:right center;animation:flipBack .58s ease both}.turn div{position:absolute;inset:0;background:center/contain no-repeat #fff;backface-visibility:hidden}.turn .rear{transform:rotateY(180deg)}@keyframes flip{from{transform:rotateY(0)}to{transform:rotateY(-180deg)}}@keyframes flipBack{from{transform:rotateY(180deg)}to{transform:rotateY(0)}}
.bottom{display:flex;align-items:center;gap:8px;padding:0 14px;border-top:1px solid var(--line);background:#081115;color:#819994;font-size:10px}.bottom .jump{margin-left:auto;display:flex;gap:6px;align-items:center}.bottom input{width:52px;height:30px;border:1px solid #355158;background:#071014;color:#fff;padding:0 7px}.bottom button{height:30px;border:1px solid #406068;background:#0e1b20;padding:0 10px}
@media(max-width:1100px){.app{grid-template-columns:190px minmax(0,1fr)}.page-index{grid-template-columns:repeat(3,1fr)}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="mark">A13</div><div><b>解析員手順書</b><small>横長ページ / 全画面表示</small></div></div><div class="note"><b>1ページを一画面に表示</b>ページ内スクロールはありません。左右キーまたはページ番号で移動します。</div><div class="page-index"><button type="button" class="page-key" data-page="0">01</button><button type="button" class="page-key" data-page="1">02</button><button type="button" class="page-key" data-page="2">03</button><button type="button" class="page-key" data-page="3">04</button><button type="button" class="page-key" data-page="4">05</button><button type="button" class="page-key" data-page="5">06</button><button type="button" class="page-key" data-page="6">07</button><button type="button" class="page-key" data-page="7">08</button><button type="button" class="page-key" data-page="8">09</button><button type="button" class="page-key" data-page="9">10</button><button type="button" class="page-key" data-page="10">11</button><button type="button" class="page-key" data-page="11">12</button><button type="button" class="page-key" data-page="12">13</button><button type="button" class="page-key" data-page="13">14</button><button type="button" class="page-key" data-page="14">15</button><button type="button" class="page-key" data-page="15">16</button><button type="button" class="page-key" data-page="16">17</button><button type="button" class="page-key" data-page="17">18</button></div><div></div><div class="controls"><a href="index.html">物語サイトへ戻る</a><a class="primary" href="game.html" target="_blank">操作者画面を開く</a><a href="ABYSS_PROTOCOL_MANUAL.pdf" target="_blank">PDF原本を開く</a></div></aside><main class="main"><header class="top"><b>ABYSS PROTOCOL 解析マニュアル</b><span class="counter" id="counter">01 / 18</span></header><section class="stage"><button class="nav" id="prev">‹</button><div class="book"><div class="page-shell" id="shell"><img id="pageImage" src="manual_p01.png" alt="手順書1ページ"><div class="turn" id="turn"><div class="front" id="front"></div><div class="rear" id="rear"></div></div></div></div><button class="nav" id="next">›</button></section><footer class="bottom">← → キーでページ移動<div class="jump"><span>ページ</span><input id="jump" type="number" min="1" max="18" value="1"><button id="openPage" type="button">開く</button></div></footer></main></div><script>
const pages=["manual_p01.png", "manual_p02.png", "manual_p03.png", "manual_p04.png", "manual_p05.png", "manual_p06.png", "manual_p07.png", "manual_p08.png", "manual_p09.png", "manual_p10.png", "manual_p11.png", "manual_p12.png", "manual_p13.png", "manual_p14.png", "manual_p15.png", "manual_p16.png", "manual_p17.png", "manual_p18.png"];let current=0,audio=null,turning=false;const img=document.getElementById('pageImage'),counter=document.getElementById('counter'),turn=document.getElementById('turn'),front=document.getElementById('front'),rear=document.getElementById('rear'),keys=[...document.querySelectorAll('.page-key')];
function ensureAudio(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)()}
function flipSound(){try{ensureAudio();if(audio.state==='suspended')audio.resume();const len=Math.floor(audio.sampleRate*.24),b=audio.createBuffer(1,len,audio.sampleRate),data=b.getChannelData(0);for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(audio.sampleRate*.06))*.25;const s=audio.createBufferSource(),f=audio.createBiquadFilter(),g=audio.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=750;g.gain.value=.2;s.connect(f);f.connect(g);g.connect(audio.destination);s.start();}catch(e){}}
function sync(){img.src=pages[current];img.alt=`手順書${current+1}ページ`;counter.textContent=`${String(current+1).padStart(2,'0')} / 18`;document.getElementById('jump').value=current+1;keys.forEach((k,i)=>k.classList.toggle('active',i===current));history.replaceState(null,'',`#page-${current+1}`)}
function go(n){n=Math.max(0,Math.min(pages.length-1,n));if(n===current||turning)return;turning=true;const forward=n>current;front.style.backgroundImage=`url(${pages[current]})`;rear.style.backgroundImage=`url(${pages[n]})`;turn.className='turn '+(forward?'run':'run back');flipSound();setTimeout(()=>img.src=pages[n],280);setTimeout(()=>{current=n;turn.className='turn';turning=false;sync()},610)}
keys.forEach((k,i)=>k.addEventListener('click',()=>go(i)));document.getElementById('prev').addEventListener('click',()=>go(current-1));document.getElementById('next').addEventListener('click',()=>go(current+1));document.getElementById('openPage').addEventListener('click',()=>go(Number(document.getElementById('jump').value)-1));window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')go(current-1);if(e.key==='ArrowRight')go(current+1)});const m=location.hash.match(/page-(\d+)/);if(m)current=Math.max(0,Math.min(17,Number(m[1])-1));sync();
</script></body></html>
